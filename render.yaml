services:
  - type: web
    name: critter-dash
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Set this manually in the Render dashboard to your Neon connection
      # string (Settings > Environment on the critter-dash service).
      # Example: postgresql://user:password@ep-xxxx.neon.tech/critterdash?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: NODE_VERSION
        value: 20.11.1
