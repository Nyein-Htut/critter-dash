databases:
  - name: critter-dash-db
    plan: free
    databaseName: critterdash
    user: critterdash

services:
  - type: web
    name: critter-dash
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: critter-dash-db
          property: connectionString
      - key: NODE_VERSION
        value: 20.11.1
